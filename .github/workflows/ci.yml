name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - run: make lint
      - run: make test
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # govulncheck panics with GOEXPERIMENT=jsonv2 as of current toolchain.
          # Run without jsonv2 tags to keep vulnerability scanning functional.
          govulncheck ./...
        working-directory: src

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b "$RUNNER_TEMP/bin" v8.24.2
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run Gitleaks
        id: gitleaks
        run: |
          set +e
          gitleaks dir . --report-format sarif --report-path gitleaks-results.sarif
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Gitleaks results
        if: always() && hashFiles('gitleaks-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-results.sarif

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run Trivy filesystem scan
        run: trivy fs --scanners vuln,misconfig --severity HIGH,CRITICAL --format sarif --output trivy-results.sarif .

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on Gitleaks findings
        if: steps.gitleaks.outputs.exit_code != '0'
        run: exit 1

  build:
    needs:
      - test
      - security
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} make build
      - uses: actions/upload-artifact@v4
        with:
          name: safnari-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/safnari-${{ matrix.goos }}-${{ matrix.goarch }}*

  sbom:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: bin

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Generate SBOMs
        run: |
          mkdir -p artifacts/sbom
          syft dir:. -o spdx-json=artifacts/sbom/source.spdx.json
          syft dir:bin -o spdx-json=artifacts/sbom/binaries.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: artifacts/sbom

  release:
    needs:
      - build
      - sbom
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: bin
      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: artifacts/sbom
      - name: Compute release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          date=$(date -u +%Y%m%d)
          count=$(gh release list --limit 100 --json tagName \
            | jq --arg date "$date" '[.[] | select(.tagName | startswith("safnari-" + $date))] | length')
          letter=$(printf '%b' "$(printf '\\%03o' $((97 + count)))")
          echo "tag=safnari-${date}${letter}" >> "$GITHUB_OUTPUT"
      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/**
            artifacts/sbom/**
      - name: Release on main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/**
            artifacts/sbom/**
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
