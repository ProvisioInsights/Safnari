name: Performance

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

jobs:
  benchmark-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Verify parity fixtures
        run: go test ./scanner -run TestV2OutputNDJSONDeterministicAcrossProfiles -count=1
        working-directory: src
        shell: bash

      - name: Run ultra benchmark harness
        run: make bench-ultra
        shell: bash

      - name: Evaluate performance gate
        id: pr_gate
        run: make bench-gate
        shell: bash
        continue-on-error: true

      - name: Capture benchmark artifact directory
        if: always()
        id: bench_dir
        run: |
          latest="$(find artifacts/bench -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' -print 2>/dev/null | sort -r | head -n1)"
          echo "dir=$latest" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: actions/upload-artifact@v4
        if: always() && steps.bench_dir.outputs.dir != ''
        with:
          name: benchmarks-linux-amd64
          path: ${{ steps.bench_dir.outputs.dir }}

      - name: Capture gate artifact directory
        if: always()
        id: gate_dir
        run: |
          latest="$(find artifacts/bench -maxdepth 1 -mindepth 1 -type d -name 'gate-*' -print 2>/dev/null | sort -r | head -n1)"
          echo "dir=$latest" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: actions/upload-artifact@v4
        if: always() && steps.gate_dir.outputs.dir != ''
        with:
          name: perf-gate-linux-amd64
          path: ${{ steps.gate_dir.outputs.dir }}

      - name: Summarize PR benchmark gate
        if: always()
        run: |
          if [ "${{ steps.pr_gate.outcome }}" = "success" ]; then
            echo "PR performance gate passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "PR performance gate is informational and did not meet the current thresholds." >> "$GITHUB_STEP_SUMMARY"
            echo "See the perf-gate-linux-amd64 artifact for the detailed comparison output." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The benchmarks-linux-amd64 artifact includes site/index.html and metrics.json for dashboard preview." >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Generate PGO profile
        run: make profile-generate
        shell: bash

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pgo-profile-linux-amd64
          path: src/pgo/default.pgo

      - name: Build with PGO
        run: make build-pgo-ultra
        shell: bash

  benchmark-matrix:
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Verify parity fixtures
        run: go test ./scanner -run TestV2OutputNDJSONDeterministicAcrossProfiles -count=1
        working-directory: src
        shell: bash

      - name: Run ultra benchmark harness
        run: make bench-ultra
        shell: bash

      - name: Enforce performance gate
        run: make bench-gate
        shell: bash

      - name: Capture benchmark artifact directory
        if: always()
        id: bench_dir
        run: |
          latest="$(find artifacts/bench -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' -print 2>/dev/null | sort -r | head -n1)"
          echo "dir=$latest" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: actions/upload-artifact@v4
        if: always() && steps.bench_dir.outputs.dir != ''
        with:
          name: benchmarks-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.bench_dir.outputs.dir }}

      - name: Capture gate artifact directory
        if: always()
        id: gate_dir
        run: |
          latest="$(find artifacts/bench -maxdepth 1 -mindepth 1 -type d -name 'gate-*' -print 2>/dev/null | sort -r | head -n1)"
          echo "dir=$latest" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: actions/upload-artifact@v4
        if: always() && steps.gate_dir.outputs.dir != ''
        with:
          name: perf-gate-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.gate_dir.outputs.dir }}

      - name: Generate PGO profile
        if: matrix.os == 'ubuntu-latest'
        run: make profile-generate
        shell: bash

      - uses: actions/upload-artifact@v4
        if: always() && matrix.os == 'ubuntu-latest'
        with:
          name: pgo-profile-${{ matrix.goos }}-${{ matrix.goarch }}
          path: src/pgo/default.pgo

      - name: Build with PGO
        if: matrix.os == 'ubuntu-latest'
        run: make build-pgo-ultra
        shell: bash

  simd-experiment:
    if: github.event_name != 'pull_request'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Run SIMD benchmark comparison
        run: make bench-simd
        shell: bash

      - name: Capture SIMD artifact directory
        id: simd_dir
        run: |
          latest="$(find artifacts/bench -maxdepth 1 -mindepth 1 -type d -name 'simd-*' -print 2>/dev/null | sort -r | head -n1)"
          echo "dir=$latest" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: simd-benchmarks-linux-amd64
          path: ${{ steps.simd_dir.outputs.dir }}

  performance-dashboard:
    if: github.event_name != 'pull_request'
    needs: benchmark-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/download-artifact@v4
        with:
          name: benchmarks-linux-amd64
          path: performance-dashboard

      - name: Carry forward benchmark history
        run: |
          set -euo pipefail
          history_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/metrics-history.jsonl"
          if ! history_status="$(curl -sSL -w '%{http_code}' -o performance-dashboard/metrics-history.jsonl "$history_url")"; then
            echo "Failed to fetch existing benchmark history from $history_url" >&2
            exit 1
          fi
          if [ "$history_status" = "404" ]; then
            : > performance-dashboard/metrics-history.jsonl
          elif [ "$history_status" -lt 200 ] || [ "$history_status" -ge 300 ]; then
            echo "Failed to fetch existing benchmark history: HTTP $history_status" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("performance-dashboard/metrics-history.jsonl")
          valid = []
          for line in path.read_text(errors="replace").splitlines():
              try:
                  json.loads(line)
              except json.JSONDecodeError:
                  continue
              valid.append(line)
          path.write_text("\n".join(valid) + ("\n" if valid else ""))
          PY
          jq -c . performance-dashboard/metrics.json >> performance-dashboard/metrics-history.jsonl
          tail -n 200 performance-dashboard/metrics-history.jsonl > performance-dashboard/metrics-history.tmp
          mv performance-dashboard/metrics-history.tmp performance-dashboard/metrics-history.jsonl
          python3 source/scripts/bench/render-dashboard.py performance-dashboard
        shell: bash

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: performance-dashboard/site

      - id: deployment
        uses: actions/deploy-pages@v4
